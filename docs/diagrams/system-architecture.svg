<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 640" width="860" height="640">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0a0e1a"/>
    <stop offset="100%" stop-color="#111827"/>
  </linearGradient>
  <linearGradient id="glow-cyan" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#06b6d4"/>
    <stop offset="100%" stop-color="#22d3ee"/>
  </linearGradient>
  <linearGradient id="glow-violet" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#8b5cf6"/>
    <stop offset="100%" stop-color="#a78bfa"/>
  </linearGradient>
  <linearGradient id="glow-emerald" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#10b981"/>
    <stop offset="100%" stop-color="#34d399"/>
  </linearGradient>
  <linearGradient id="glow-amber" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#f59e0b"/>
    <stop offset="100%" stop-color="#fbbf24"/>
  </linearGradient>
  <marker id="a-cy" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#22d3ee"/>
  </marker>
  <marker id="a-vi" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#a78bfa"/>
  </marker>
  <marker id="a-em" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#34d399"/>
  </marker>
  <marker id="a-dim" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#4b5563"/>
  </marker>
  <filter id="card-shadow">
    <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
  </filter>
</defs>

<!-- Background -->
<rect width="860" height="640" fill="url(#bg)"/>

<!-- Title -->
<text x="430" y="30" font-family="'Inter',sans-serif" font-size="11" fill="#6b7280" text-anchor="middle" letter-spacing="3" text-transform="uppercase">REWINDDB ARCHITECTURE</text>

<!-- ═══ LAYER: USER INTERFACES ═══ -->
<text x="24" y="62" font-family="'Inter',sans-serif" font-size="9" fill="#6b7280" letter-spacing="2">INTERFACES</text>
<rect x="80" y="68" width="180" height="50" rx="10" fill="#1e1b4b" fill-opacity="0.6" stroke="#8b5cf6" stroke-width="1.2" filter="url(#card-shadow)"/>
<text x="170" y="88" font-family="'Inter',sans-serif" font-size="13" fill="#c4b5fd" text-anchor="middle" font-weight="600">CLI</text>
<text x="170" y="106" font-family="'JetBrains Mono',monospace" font-size="10" fill="#7c3aed" text-anchor="middle">rw &lt;command&gt;</text>

<rect x="300" y="68" width="180" height="50" rx="10" fill="#1e1b4b" fill-opacity="0.6" stroke="#8b5cf6" stroke-width="1.2" filter="url(#card-shadow)"/>
<text x="390" y="88" font-family="'Inter',sans-serif" font-size="13" fill="#c4b5fd" text-anchor="middle" font-weight="600">Go SDK</text>
<text x="390" y="106" font-family="'JetBrains Mono',monospace" font-size="10" fill="#7c3aed" text-anchor="middle">sdk.New(path)</text>

<rect x="520" y="68" width="180" height="50" rx="10" fill="#1e1b4b" fill-opacity="0.3" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="6,4" filter="url(#card-shadow)"/>
<text x="610" y="88" font-family="'Inter',sans-serif" font-size="13" fill="#7c3aed" text-anchor="middle" font-weight="600">Web Dashboard</text>
<text x="610" y="106" font-family="'JetBrains Mono',monospace" font-size="10" fill="#4c1d95" text-anchor="middle">planned</text>

<!-- Arrows down from interfaces -->
<line x1="170" y1="118" x2="170" y2="148" stroke="#8b5cf6" stroke-width="1.2" marker-end="url(#a-vi)"/>
<line x1="390" y1="118" x2="390" y2="148" stroke="#8b5cf6" stroke-width="1.2" marker-end="url(#a-vi)"/>
<line x1="610" y1="118" x2="610" y2="148" stroke="#8b5cf6" stroke-width="0.8" stroke-dasharray="4,3" marker-end="url(#a-vi)"/>

<!-- ═══ LAYER: COMMAND HANDLER ═══ -->
<text x="24" y="165" font-family="'Inter',sans-serif" font-size="9" fill="#6b7280" letter-spacing="2">ROUTER</text>
<rect x="80" y="150" width="620" height="42" rx="10" fill="#1f2937" stroke="#374151" stroke-width="1" filter="url(#card-shadow)"/>
<text x="390" y="168" font-family="'Inter',sans-serif" font-size="12" fill="#e5e7eb" text-anchor="middle" font-weight="600">Command Handler / Router</text>
<text x="390" y="184" font-family="'JetBrains Mono',monospace" font-size="9" fill="#6b7280" text-anchor="middle">parse flags · resolve refs · acquire lock · dispatch</text>

<!-- Arrows down to engines -->
<line x1="170" y1="192" x2="130" y2="236" stroke="#06b6d4" stroke-width="1.2" marker-end="url(#a-cy)"/>
<line x1="310" y1="192" x2="310" y2="236" stroke="#06b6d4" stroke-width="1.2" marker-end="url(#a-cy)"/>
<line x1="470" y1="192" x2="490" y2="236" stroke="#06b6d4" stroke-width="1.2" marker-end="url(#a-cy)"/>
<line x1="590" y1="192" x2="660" y2="236" stroke="#06b6d4" stroke-width="1.2" marker-end="url(#a-cy)"/>

<!-- ═══ LAYER: CORE ENGINES ═══ -->
<text x="24" y="248" font-family="'Inter',sans-serif" font-size="9" fill="#6b7280" letter-spacing="2">ENGINES</text>

<rect x="40" y="238" width="170" height="62" rx="10" fill="#083344" fill-opacity="0.7" stroke="#06b6d4" stroke-width="1.5" filter="url(#card-shadow)"/>
<text x="125" y="258" font-family="'Inter',sans-serif" font-size="12" fill="#22d3ee" text-anchor="middle" font-weight="700">Timeline Engine</text>
<text x="125" y="274" font-family="'JetBrains Mono',monospace" font-size="9" fill="#67e8f9" text-anchor="middle" opacity="0.7">DAG · branches · HEAD</text>
<text x="125" y="288" font-family="'JetBrains Mono',monospace" font-size="9" fill="#67e8f9" text-anchor="middle" opacity="0.7">refs · S-numbers</text>

<rect x="230" y="238" width="170" height="62" rx="10" fill="#083344" fill-opacity="0.7" stroke="#06b6d4" stroke-width="1.5" filter="url(#card-shadow)"/>
<text x="315" y="258" font-family="'Inter',sans-serif" font-size="12" fill="#22d3ee" text-anchor="middle" font-weight="700">Snapshot Engine</text>
<text x="315" y="274" font-family="'JetBrains Mono',monospace" font-size="9" fill="#67e8f9" text-anchor="middle" opacity="0.7">scan · hash · save</text>
<text x="315" y="288" font-family="'JetBrains Mono',monospace" font-size="9" fill="#67e8f9" text-anchor="middle" opacity="0.7">restore · delta · cache</text>

<rect x="420" y="238" width="170" height="62" rx="10" fill="#083344" fill-opacity="0.7" stroke="#06b6d4" stroke-width="1.5" filter="url(#card-shadow)"/>
<text x="505" y="258" font-family="'Inter',sans-serif" font-size="12" fill="#22d3ee" text-anchor="middle" font-weight="700">Diff Engine</text>
<text x="505" y="274" font-family="'JetBrains Mono',monospace" font-size="9" fill="#67e8f9" text-anchor="middle" opacity="0.7">unified diff · udiff</text>
<text x="505" y="288" font-family="'JetBrains Mono',monospace" font-size="9" fill="#67e8f9" text-anchor="middle" opacity="0.7">added / removed</text>

<rect x="610" y="238" width="170" height="62" rx="10" fill="#083344" fill-opacity="0.7" stroke="#06b6d4" stroke-width="1.5" filter="url(#card-shadow)"/>
<text x="695" y="258" font-family="'Inter',sans-serif" font-size="12" fill="#22d3ee" text-anchor="middle" font-weight="700">Branch Manager</text>
<text x="695" y="274" font-family="'JetBrains Mono',monospace" font-size="9" fill="#67e8f9" text-anchor="middle" opacity="0.7">create · switch</text>
<text x="695" y="288" font-family="'JetBrains Mono',monospace" font-size="9" fill="#67e8f9" text-anchor="middle" opacity="0.7">auto-branch on goto</text>

<!-- Cross-engine connections -->
<line x1="210" y1="264" x2="228" y2="264" stroke="#22d3ee" stroke-width="1" marker-end="url(#a-cy)"/>
<line x1="228" y1="278" x2="212" y2="278" stroke="#22d3ee" stroke-width="1" marker-end="url(#a-cy)"/>
<path d="M210,254 Q390,222 418,254" fill="none" stroke="#a78bfa" stroke-width="0.8" stroke-dasharray="4,2" marker-end="url(#a-vi)"/>

<!-- Arrows down to storage -->
<line x1="125" y1="300" x2="125" y2="340" stroke="#4b5563" stroke-width="1" marker-end="url(#a-dim)"/>
<line x1="315" y1="300" x2="315" y2="340" stroke="#4b5563" stroke-width="1" marker-end="url(#a-dim)"/>
<line x1="505" y1="300" x2="430" y2="340" stroke="#4b5563" stroke-width="0.8" marker-end="url(#a-dim)"/>
<line x1="695" y1="300" x2="620" y2="340" stroke="#4b5563" stroke-width="0.8" marker-end="url(#a-dim)"/>

