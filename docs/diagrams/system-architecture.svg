<circle cx="644" cy="616" r="5" fill="#06b6d4"/>
<text x="656" y="620" font-family="'Inter',sans-serif" font-size="9" fill="#d1d5db">engine</text>
<circle cx="700" cy="616" r="5" fill="#10b981"/>
<text x="712" y="620" font-family="'Inter',sans-serif" font-size="9" fill="#d1d5db">storage</text>
<circle cx="756" cy="616" r="5" fill="#8b5cf6"/>
<text x="768" y="620" font-family="'Inter',sans-serif" font-size="9" fill="#d1d5db">interface</text>
<circle cx="816" cy="616" r="5" fill="#f59e0b"/>
<text x="828" y="620" font-family="'Inter',sans-serif" font-size="9" fill="#d1d5db">safety</text>
