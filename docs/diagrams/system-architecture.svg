<rect x="40" y="342" width="220" height="60" rx="10" fill="#052e16" fill-opacity="0.6" stroke="#10b981" stroke-width="1.5" filter="url(#card-shadow)"/>
<text x="150" y="362" font-family="'Inter',sans-serif" font-size="12" fill="#34d399" text-anchor="middle" font-weight="700">Object Store</text>
<text x="150" y="378" font-family="'JetBrains Mono',monospace" font-size="9" fill="#6ee7b7" text-anchor="middle" opacity="0.7">content-addressable · SHA-256</text>
<text x="150" y="392" font-family="'JetBrains Mono',monospace" font-size="9" fill="#6ee7b7" text-anchor="middle" opacity="0.7">deduplicated · gzip</text>

<rect x="290" y="342" width="220" height="60" rx="10" fill="#052e16" fill-opacity="0.6" stroke="#10b981" stroke-width="1.5" filter="url(#card-shadow)"/>
<text x="400" y="362" font-family="'Inter',sans-serif" font-size="12" fill="#34d399" text-anchor="middle" font-weight="700">Index</text>
<text x="400" y="378" font-family="'JetBrains Mono',monospace" font-size="9" fill="#6ee7b7" text-anchor="middle" opacity="0.7">branches · checkpoints</text>
<text x="400" y="392" font-family="'JetBrains Mono',monospace" font-size="9" fill="#6ee7b7" text-anchor="middle" opacity="0.7">HEAD · tags · S-numbers</text>

<rect x="540" y="342" width="220" height="60" rx="10" fill="#052e16" fill-opacity="0.6" stroke="#10b981" stroke-width="1.5" filter="url(#card-shadow)"/>
<text x="650" y="362" font-family="'Inter',sans-serif" font-size="12" fill="#34d399" text-anchor="middle" font-weight="700">Cache Layer</text>
<text x="650" y="378" font-family="'JetBrains Mono',monospace" font-size="9" fill="#6ee7b7" text-anchor="middle" opacity="0.7">LRU snapshots · mtime</text>
<text x="650" y="392" font-family="'JetBrains Mono',monospace" font-size="9" fill="#6ee7b7" text-anchor="middle" opacity="0.7">singleflight dedup</text>

<!-- Arrows down to persistence -->
<line x1="150" y1="402" x2="150" y2="448" stroke="#4b5563" stroke-width="1" marker-end="url(#a-dim)"/>
<line x1="400" y1="402" x2="400" y2="448" stroke="#4b5563" stroke-width="1" marker-end="url(#a-dim)"/>
<line x1="650" y1="402" x2="650" y2="448" stroke="#4b5563" stroke-width="1" marker-end="url(#a-dim)"/>

<!-- ═══ LAYER: PERSISTENCE ═══ -->
<text x="24" y="463" font-family="'Inter',sans-serif" font-size="9" fill="#6b7280" letter-spacing="2">DISK</text>

<rect x="40" y="450" width="220" height="48" rx="10" fill="#111827" stroke="#374151" stroke-width="1" stroke-dasharray="6,4"/>
<text x="150" y="470" font-family="'JetBrains Mono',monospace" font-size="11" fill="#9ca3af" text-anchor="middle">.rewind/objects/</text>
<text x="150" y="488" font-family="'JetBrains Mono',monospace" font-size="9" fill="#6b7280" text-anchor="middle">ab/cdef1234...  7c/9d4e...</text>

<rect x="290" y="450" width="220" height="48" rx="10" fill="#111827" stroke="#374151" stroke-width="1" stroke-dasharray="6,4"/>
<text x="400" y="470" font-family="'JetBrains Mono',monospace" font-size="11" fill="#9ca3af" text-anchor="middle">.rewind/index.json</text>
<text x="400" y="488" font-family="'JetBrains Mono',monospace" font-size="9" fill="#6b7280" text-anchor="middle">fsync + rename (atomic)</text>

<rect x="540" y="450" width="220" height="48" rx="10" fill="#111827" stroke="#374151" stroke-width="1" stroke-dasharray="6,4"/>
<text x="650" y="470" font-family="'JetBrains Mono',monospace" font-size="11" fill="#9ca3af" text-anchor="middle">.rewind/last-scan.json</text>
<text x="650" y="488" font-family="'JetBrains Mono',monospace" font-size="9" fill="#6b7280" text-anchor="middle">mtime cache · fast skip</text>

<!-- ═══ LAYER: SAFETY (new — WAL + Merkle) ═══ -->
<text x="24" y="532" font-family="'Inter',sans-serif" font-size="9" fill="#6b7280" letter-spacing="2">SAFETY</text>

<rect x="40" y="538" width="340" height="52" rx="10" fill="#451a03" fill-opacity="0.4" stroke="#f59e0b" stroke-width="1.2" filter="url(#card-shadow)"/>
<text x="210" y="558" font-family="'Inter',sans-serif" font-size="12" fill="#fbbf24" text-anchor="middle" font-weight="700">Write-Ahead Log (WAL)</text>
<text x="210" y="576" font-family="'JetBrains Mono',monospace" font-size="9" fill="#fcd34d" text-anchor="middle" opacity="0.7">INTENT → OBJECT(s) → COMMIT · crash recovery</text>

<rect x="420" y="538" width="340" height="52" rx="10" fill="#451a03" fill-opacity="0.4" stroke="#f59e0b" stroke-width="1.2" filter="url(#card-shadow)"/>
<text x="590" y="558" font-family="'Inter',sans-serif" font-size="12" fill="#fbbf24" text-anchor="middle" font-weight="700">Merkle Verification</text>
<text x="590" y="576" font-family="'JetBrains Mono',monospace" font-size="9" fill="#fcd34d" text-anchor="middle" opacity="0.7">binary tree over SHA-256 · corruption detection</text>

<!-- Connectors from persistence to safety -->
<line x1="150" y1="498" x2="150" y2="536" stroke="#f59e0b" stroke-width="0.8" stroke-dasharray="3,3" marker-end="url(#a-dim)"/>
<line x1="400" y1="498" x2="400" y2="536" stroke="#f59e0b" stroke-width="0.8" stroke-dasharray="3,3" marker-end="url(#a-dim)"/>

