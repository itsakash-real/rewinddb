<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 460" width="860" height="460">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0a0e1a"/>
    <stop offset="100%" stop-color="#111827"/>
  </linearGradient>
  <marker id="a-cy" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#22d3ee"/>
  </marker>
  <marker id="a-am" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#fbbf24"/>
  </marker>
  <filter id="s">
    <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
  </filter>
</defs>

<rect width="860" height="460" fill="url(#bg)"/>
<text x="430" y="24" font-family="'Inter',sans-serif" font-size="9" fill="#6b7280" text-anchor="middle" letter-spacing="3">CONTENT-ADDRESSABLE OBJECT STORE</text>

<!-- ═══ LEFT: Project Files ═══ -->
<text x="50" y="54" font-family="'Inter',sans-serif" font-size="11" fill="#6b7280" letter-spacing="1">YOUR FILES</text>

<rect x="40" y="64" width="190" height="42" rx="10" fill="#1f2937" stroke="#374151" stroke-width="1" filter="url(#s)"/>
<text x="60" y="82" font-family="'JetBrains Mono',monospace" font-size="12" fill="#e5e7eb">auth.js</text>
<text x="60" y="98" font-family="'JetBrains Mono',monospace" font-size="8" fill="#6b7280">1.4 KB</text>
<text x="216" y="82" font-family="'JetBrains Mono',monospace" font-size="9" fill="#22d3ee" text-anchor="end">a3f2b1...</text>

<rect x="40" y="118" width="190" height="42" rx="10" fill="#1f2937" stroke="#374151" stroke-width="1" filter="url(#s)"/>
<text x="60" y="136" font-family="'JetBrains Mono',monospace" font-size="12" fill="#e5e7eb">index.js</text>
<text x="60" y="152" font-family="'JetBrains Mono',monospace" font-size="8" fill="#6b7280">2.1 KB</text>
<text x="216" y="136" font-family="'JetBrains Mono',monospace" font-size="9" fill="#22d3ee" text-anchor="end">7c9d4e...</text>

<rect x="40" y="172" width="190" height="42" rx="10" fill="#1f2937" stroke="#f59e0b" stroke-width="1.5" filter="url(#s)"/>
<text x="60" y="190" font-family="'JetBrains Mono',monospace" font-size="12" fill="#e5e7eb">utils.js</text>
<text x="60" y="206" font-family="'JetBrains Mono',monospace" font-size="8" fill="#fbbf24">same content as auth.js</text>
<text x="216" y="190" font-family="'JetBrains Mono',monospace" font-size="9" fill="#fbbf24" text-anchor="end">a3f2b1...</text>

<rect x="40" y="226" width="190" height="42" rx="10" fill="#1f2937" stroke="#374151" stroke-width="1" filter="url(#s)"/>
<text x="60" y="244" font-family="'JetBrains Mono',monospace" font-size="12" fill="#e5e7eb">config.js</text>
<text x="60" y="260" font-family="'JetBrains Mono',monospace" font-size="8" fill="#6b7280">0.8 KB</text>
<text x="216" y="244" font-family="'JetBrains Mono',monospace" font-size="9" fill="#22d3ee" text-anchor="end">b8f1a2...</text>

<!-- ═══ CENTER: SHA-256 decision ═══ -->
<rect x="290" y="120" width="200" height="68" rx="14" fill="#1f2937" stroke="#374151" stroke-width="1" stroke-dasharray="6,4" filter="url(#s)"/>
<text x="390" y="144" font-family="'Inter',sans-serif" font-size="12" fill="#e5e7eb" text-anchor="middle" font-weight="600">SHA-256 decides</text>
<text x="390" y="162" font-family="'Inter',sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">same content</text>
<text x="390" y="178" font-family="'Inter',sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">= same hash = stored once</text>

<!-- Arrows from files to center -->
<line x1="232" y1="85" x2="288" y2="140" stroke="#22d3ee" stroke-width="1.2" marker-end="url(#a-cy)"/>
<line x1="232" y1="139" x2="288" y2="150" stroke="#22d3ee" stroke-width="1.2" marker-end="url(#a-cy)"/>
<line x1="232" y1="193" x2="288" y2="160" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#a-am)"/>
<line x1="232" y1="247" x2="288" y2="172" stroke="#22d3ee" stroke-width="1.2" marker-end="url(#a-cy)"/>

<!-- ═══ RIGHT: Object Store ═══ -->
<text x="550" y="54" font-family="'JetBrains Mono',monospace" font-size="11" fill="#34d399" letter-spacing="1">.rewind/objects/</text>

<!-- Object a3/ -->
<rect x="540" y="64" width="280" height="76" rx="10" fill="#052e16" fill-opacity="0.5" stroke="#10b981" stroke-width="1.2" filter="url(#s)"/>
<text x="560" y="82" font-family="'JetBrains Mono',monospace" font-size="11" fill="#34d399" font-weight="600">a3/</text>
<rect x="570" y="90" width="236" height="24" rx="6" fill="#111827" stroke="#374151" stroke-width="0.8"/>
<text x="584" y="107" font-family="'JetBrains Mono',monospace" font-size="10" fill="#d1d5db">f2b1c84d9a0e3f72...</text>
<rect x="570" y="118" width="236" height="14" rx="4" fill="#f59e0b" fill-opacity="0.1"/>
<text x="688" y="129" font-family="'Inter',sans-serif" font-size="8" fill="#fbbf24" text-anchor="middle">used by auth.js AND utils.js</text>

<!-- Object 7c/ -->
<rect x="540" y="152" width="280" height="58" rx="10" fill="#052e16" fill-opacity="0.5" stroke="#10b981" stroke-width="1.2" filter="url(#s)"/>
<text x="560" y="172" font-family="'JetBrains Mono',monospace" font-size="11" fill="#34d399" font-weight="600">7c/</text>
<rect x="570" y="180" width="236" height="24" rx="6" fill="#111827" stroke="#374151" stroke-width="0.8"/>
<text x="584" y="197" font-family="'JetBrains Mono',monospace" font-size="10" fill="#d1d5db">9d4e7a2b1c8f0e3...</text>

<!-- Object b8/ -->
<rect x="540" y="222" width="280" height="58" rx="10" fill="#052e16" fill-opacity="0.5" stroke="#10b981" stroke-width="1.2" filter="url(#s)"/>
<text x="560" y="242" font-family="'JetBrains Mono',monospace" font-size="11" fill="#34d399" font-weight="600">b8/</text>
<rect x="570" y="250" width="236" height="24" rx="6" fill="#111827" stroke="#374151" stroke-width="0.8"/>
<text x="584" y="267" font-family="'JetBrains Mono',monospace" font-size="10" fill="#d1d5db">f1a2c4d8e9b03f1...</text>

<!-- Arrows from center to objects -->
<line x1="492" y1="142" x2="538" y2="100" stroke="#22d3ee" stroke-width="1.2" marker-end="url(#a-cy)"/>
<line x1="492" y1="150" x2="538" y2="98" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#a-am)"/>
<line x1="492" y1="155" x2="538" y2="180" stroke="#22d3ee" stroke-width="1.2" marker-end="url(#a-cy)"/>
<line x1="492" y1="168" x2="538" y2="250" stroke="#22d3ee" stroke-width="1.2" marker-end="url(#a-cy)"/>

<!-- Dedup callout -->
<text x="688" y="306" font-family="'Inter',sans-serif" font-size="11" fill="#fbbf24" text-anchor="middle" font-weight="700">2 files, 1 object — zero duplication</text>

<!-- ═══ BOTTOM: Stats ═══ -->
<rect x="40" y="340" width="240" height="100" rx="12" fill="#1f2937" stroke="#374151" stroke-width="1" filter="url(#s)"/>
<text x="160" y="364" font-family="'Inter',sans-serif" font-size="10" fill="#6b7280" text-anchor="middle" letter-spacing="1">DEDUPLICATION</text>
<line x1="56" y1="372" x2="264" y2="372" stroke="#374151" stroke-width="0.8"/>
<text x="60" y="394" font-family="'Inter',sans-serif" font-size="12" fill="#e5e7eb">auth.js <tspan fill="#fbbf24" font-weight="600">= </tspan>utils.js</text>
<text x="60" y="414" font-family="'JetBrains Mono',monospace" font-size="10" fill="#6b7280">both hash: <tspan fill="#fbbf24">a3f2b1...</tspan></text>
<text x="60" y="432" font-family="'Inter',sans-serif" font-size="10" fill="#34d399">written to disk once</text>

<rect x="540" y="340" width="280" height="100" rx="12" fill="#1f2937" stroke="#374151" stroke-width="1" filter="url(#s)"/>
<text x="680" y="364" font-family="'Inter',sans-serif" font-size="10" fill="#6b7280" text-anchor="middle" letter-spacing="1">STORAGE STATS</text>
<line x1="556" y1="372" x2="804" y2="372" stroke="#374151" stroke-width="0.8"/>
<text x="560" y="394" font-family="'Inter',sans-serif" font-size="12" fill="#e5e7eb">4 project files</text>
<text x="560" y="414" font-family="'JetBrains Mono',monospace" font-size="12" fill="#34d399">3 objects stored</text>
<text x="560" y="434" font-family="'Inter',sans-serif" font-size="11" fill="#6b7280">storage saved: <tspan fill="#fbbf24" font-weight="700">25%</tspan></text>
</svg>
