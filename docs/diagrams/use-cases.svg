<text x="434" y="108" font-family="monospace" font-size="11" fill="#8b949e">$</text>
<text x="444" y="108" font-family="monospace" font-size="11" fill="#e6edf3"> rw save "before AI changes"</text>
<text x="434" y="126" font-family="monospace" font-size="11" fill="#3fb950">&#x2713;</text>
<text x="444" y="126" font-family="monospace" font-size="11" fill="#3fb950"> 9d1e4f72  before AI changes</text>
<text x="434" y="148" font-family="monospace" font-size="11" fill="#6e7681"># accept AI suggestion...</text>
<text x="434" y="168" font-family="monospace" font-size="11" fill="#6e7681"># three prompts later: disaster</text>
