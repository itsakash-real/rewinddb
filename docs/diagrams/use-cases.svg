<text x="54" y="430" font-family="monospace" font-size="11" fill="#e6edf3"> rw save "approach B — channels"</text>
<text x="44" y="450" font-family="monospace" font-size="11" fill="#f0883e">  &#x21B3; new branch auto-created</text>
