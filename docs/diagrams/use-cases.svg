<text x="44" y="108" font-family="monospace" font-size="11" fill="#8b949e">$</text>
<text x="54" y="108" font-family="monospace" font-size="11" fill="#e6edf3"> rw save "before refactor"</text>
<text x="44" y="126" font-family="monospace" font-size="11" fill="#3fb950">&#x2713;</text>
<text x="54" y="126" font-family="monospace" font-size="11" fill="#3fb950"> a3f2b1c8  before refactor</text>
<text x="44" y="148" font-family="monospace" font-size="11" fill="#6e7681"># ... break things ...</text>
<text x="44" y="168" font-family="monospace" font-size="11" fill="#8b949e">$</text>
<text x="54" y="168" font-family="monospace" font-size="11" fill="#e6edf3"> rw goto a3f2b1c8</text>
