<text x="458" y="58" font-family="sans-serif" font-size="14" fill="#e6edf3" font-weight="700">AI Code Rollback</text>
<text x="430" y="76" font-family="sans-serif" font-size="11" fill="#8b949e">AI generated bad code? One command back.</text>
