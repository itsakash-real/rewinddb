<text x="54" y="368" font-family="monospace" font-size="11" fill="#e6edf3"> rw save "approach A — goroutines"</text>
<text x="44" y="390" font-family="monospace" font-size="11" fill="#8b949e">$</text>
<text x="54" y="390" font-family="monospace" font-size="11" fill="#e6edf3"> rw goto &lt;base id&gt;</text>
<text x="44" y="410" font-family="monospace" font-size="11" fill="#6e7681"># implement approach B</text>
