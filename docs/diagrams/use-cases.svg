<text x="68" y="58" font-family="sans-serif" font-size="14" fill="#e6edf3" font-weight="700">Safe Experimentation</text>
<text x="40" y="76" font-family="sans-serif" font-size="11" fill="#8b949e">Trying a risky refactor? Save first.</text>
