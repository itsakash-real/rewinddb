<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" width="860" height="520">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0a0e1a"/>
    <stop offset="100%" stop-color="#111827"/>
  </linearGradient>
  <linearGradient id="bar-cyan" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#06b6d4"/>
    <stop offset="100%" stop-color="#22d3ee"/>
  </linearGradient>
  <linearGradient id="bar-violet" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#8b5cf6"/>
    <stop offset="100%" stop-color="#a78bfa"/>
  </linearGradient>
  <linearGradient id="bar-amber" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#f59e0b"/>
    <stop offset="100%" stop-color="#fbbf24"/>
  </linearGradient>
  <linearGradient id="bar-rose" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#e11d48"/>
    <stop offset="100%" stop-color="#f43f5e"/>
  </linearGradient>
  <filter id="s">
    <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
  </filter>
</defs>

<rect width="860" height="520" fill="url(#bg)"/>
<text x="430" y="24" font-family="'Inter',sans-serif" font-size="9" fill="#6b7280" text-anchor="middle" letter-spacing="3">USE CASES</text>

<!-- ═══ Card 1: Safe Experimentation ═══ -->
<rect x="20" y="38" width="400" height="218" rx="12" fill="#1f2937" stroke="#374151" stroke-width="1" filter="url(#s)"/>
<rect x="20" y="38" width="400" height="4" rx="2" fill="url(#bar-cyan)"/>
<text x="48" y="68" font-family="'Inter',sans-serif" font-size="14" fill="#e5e7eb" font-weight="700">Safe Experimentation</text>
<text x="48" y="86" font-family="'Inter',sans-serif" font-size="10" fill="#6b7280">Trying a risky refactor? Save first.</text>

<rect x="32" y="98" width="376" height="146" rx="8" fill="#111827" stroke="#374151" stroke-width="0.8"/>
<text x="48" y="120" font-family="'JetBrains Mono',monospace" font-size="10" fill="#6b7280">$</text>
<text x="58" y="120" font-family="'JetBrains Mono',monospace" font-size="10" fill="#e5e7eb"> rw save "before refactor"</text>
<text x="48" y="140" font-family="'JetBrains Mono',monospace" font-size="10" fill="#34d399">  a3f2b1c8  before refactor</text>

<text x="48" y="162" font-family="'JetBrains Mono',monospace" font-size="10" fill="#4b5563"># ... break things ...</text>

<text x="48" y="184" font-family="'JetBrains Mono',monospace" font-size="10" fill="#6b7280">$</text>
<text x="58" y="184" font-family="'JetBrains Mono',monospace" font-size="10" fill="#e5e7eb"> rw goto a3f2b1c8</text>
<text x="48" y="204" font-family="'JetBrains Mono',monospace" font-size="10" fill="#22d3ee">  Restored 3 files, skipped 44</text>

<text x="48" y="228" font-family="'JetBrains Mono',monospace" font-size="10" fill="#6b7280">$</text>
<text x="58" y="228" font-family="'JetBrains Mono',monospace" font-size="10" fill="#e5e7eb"> rw diff a3f2b1c8 HEAD</text>

<!-- ═══ Card 2: AI Code Rollback ═══ -->
<rect x="440" y="38" width="400" height="218" rx="12" fill="#1f2937" stroke="#374151" stroke-width="1" filter="url(#s)"/>
<rect x="440" y="38" width="400" height="4" rx="2" fill="url(#bar-violet)"/>
<text x="468" y="68" font-family="'Inter',sans-serif" font-size="14" fill="#e5e7eb" font-weight="700">AI Code Rollback</text>
<text x="468" y="86" font-family="'Inter',sans-serif" font-size="10" fill="#6b7280">AI generated bad code? One command back.</text>

<rect x="452" y="98" width="376" height="146" rx="8" fill="#111827" stroke="#374151" stroke-width="0.8"/>
<text x="468" y="120" font-family="'JetBrains Mono',monospace" font-size="10" fill="#6b7280">$</text>
<text x="478" y="120" font-family="'JetBrains Mono',monospace" font-size="10" fill="#e5e7eb"> rw save "before AI changes"</text>
<text x="468" y="140" font-family="'JetBrains Mono',monospace" font-size="10" fill="#34d399">  9d1e4f72  before AI changes</text>

<text x="468" y="162" font-family="'JetBrains Mono',monospace" font-size="10" fill="#4b5563"># accept AI suggestion...</text>
<text x="468" y="182" font-family="'JetBrains Mono',monospace" font-size="10" fill="#4b5563"># three prompts later: disaster</text>

<text x="468" y="204" font-family="'JetBrains Mono',monospace" font-size="10" fill="#6b7280">$</text>
<text x="478" y="204" font-family="'JetBrains Mono',monospace" font-size="10" fill="#e5e7eb"> rw goto 9d1e4f72</text>
<text x="468" y="224" font-family="'JetBrains Mono',monospace" font-size="10" fill="#22d3ee">  back in &lt; 1 second</text>

<!-- ═══ Card 3: Parallel Experiments ═══ -->
<rect x="20" y="276" width="400" height="230" rx="12" fill="#1f2937" stroke="#374151" stroke-width="1" filter="url(#s)"/>
<rect x="20" y="276" width="400" height="4" rx="2" fill="url(#bar-amber)"/>
<text x="48" y="306" font-family="'Inter',sans-serif" font-size="14" fill="#e5e7eb" font-weight="700">Parallel Experiments</text>
<text x="48" y="324" font-family="'Inter',sans-serif" font-size="10" fill="#6b7280">Try two approaches, keep both.</text>

<rect x="32" y="336" width="376" height="156" rx="8" fill="#111827" stroke="#374151" stroke-width="0.8"/>
<text x="48" y="356" font-family="'JetBrains Mono',monospace" font-size="10" fill="#6b7280">$</text>
<text x="58" y="356" font-family="'JetBrains Mono',monospace" font-size="10" fill="#e5e7eb"> rw save "base — before split"</text>

<text x="48" y="378" font-family="'JetBrains Mono',monospace" font-size="10" fill="#4b5563"># implement approach A</text>
<text x="48" y="398" font-family="'JetBrains Mono',monospace" font-size="10" fill="#6b7280">$</text>
<text x="58" y="398" font-family="'JetBrains Mono',monospace" font-size="10" fill="#e5e7eb"> rw save "approach A — goroutines"</text>

<text x="48" y="420" font-family="'JetBrains Mono',monospace" font-size="10" fill="#6b7280">$</text>
<text x="58" y="420" font-family="'JetBrains Mono',monospace" font-size="10" fill="#e5e7eb"> rw goto &lt;base id&gt;</text>

<text x="48" y="442" font-family="'JetBrains Mono',monospace" font-size="10" fill="#4b5563"># implement approach B</text>
<text x="48" y="462" font-family="'JetBrains Mono',monospace" font-size="10" fill="#6b7280">$</text>
<text x="58" y="462" font-family="'JetBrains Mono',monospace" font-size="10" fill="#e5e7eb"> rw save "approach B — channels"</text>
<text x="48" y="482" font-family="'JetBrains Mono',monospace" font-size="10" fill="#fbbf24">  new branch auto-created</text>

<!-- ═══ Card 4: Debug Time Travel ═══ -->
<rect x="440" y="276" width="400" height="230" rx="12" fill="#1f2937" stroke="#374151" stroke-width="1" filter="url(#s)"/>
<rect x="440" y="276" width="400" height="4" rx="2" fill="url(#bar-rose)"/>
<text x="468" y="306" font-family="'Inter',sans-serif" font-size="14" fill="#e5e7eb" font-weight="700">Debug Time Travel</text>
<text x="468" y="324" font-family="'Inter',sans-serif" font-size="10" fill="#6b7280">Find exactly when a bug appeared.</text>

<rect x="452" y="336" width="376" height="156" rx="8" fill="#111827" stroke="#374151" stroke-width="0.8"/>
<text x="468" y="356" font-family="'JetBrains Mono',monospace" font-size="10" fill="#6b7280">$</text>
<text x="478" y="356" font-family="'JetBrains Mono',monospace" font-size="10" fill="#e5e7eb"> rw list</text>
<text x="478" y="374" font-family="'JetBrains Mono',monospace" font-size="9" fill="#4b5563">  c2e7d9a1  api done (HEAD)</text>
<text x="478" y="390" font-family="'JetBrains Mono',monospace" font-size="9" fill="#4b5563">  9d1e4f72  db fixed</text>
<text x="478" y="406" font-family="'JetBrains Mono',monospace" font-size="9" fill="#4b5563">  a3f2b1c8  auth added  &lt;-- worked</text>

<text x="468" y="428" font-family="'JetBrains Mono',monospace" font-size="10" fill="#6b7280">$</text>
<text x="478" y="428" font-family="'JetBrains Mono',monospace" font-size="10" fill="#e5e7eb"> rw goto a3f2b1c8</text>
<text x="468" y="448" font-family="'JetBrains Mono',monospace" font-size="10" fill="#34d399">  confirmed: works at this point</text>

<text x="468" y="470" font-family="'JetBrains Mono',monospace" font-size="10" fill="#6b7280">$</text>
<text x="478" y="470" font-family="'JetBrains Mono',monospace" font-size="10" fill="#e5e7eb"> rw diff a3f2b1c8 c2e7d9a1</text>
<text x="478" y="488" font-family="'JetBrains Mono',monospace" font-size="9" fill="#f43f5e">  Modified: auth/middleware.go +182B</text>
</svg>
