  <!-- Ghost body -->
  <path d="M10 22 C10 13.5, 14 7.5, 20 7.5 C26 7.5, 30 13.5, 30 22 L30 30.5 C30 31.5, 29 32.5, 28 31.5 L26 29.5 C25 28.5, 24 28.5, 23 29.5 L21 31.5 C20.5 32, 19.5 32, 19 31.5 L17 29.5 C16 28.5, 15 28.5, 14 29.5 L12 31.5 C11 32.5, 10 31.5, 10 30.5 Z" fill="url(#body)" stroke="#a5f3fc" stroke-width="0.5" stroke-opacity="0.5"/>
