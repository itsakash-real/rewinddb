  <!-- Smile -->
  <path d="M17.5 22.5 Q20 24.5, 22.5 22.5" stroke="#7dd3fc" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.7"/>
  <!-- Antennae -->
  <line x1="16" y1="8.5" x2="14" y2="4.5" stroke="#7dd3fc" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="14" cy="4" r="1.8" fill="#7dd3fc"/>
  <circle cx="14" cy="4" r="1" fill="#b8edff"/>
  <line x1="24" y1="8.5" x2="26" y2="4.5" stroke="#7dd3fc" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="26" cy="4" r="1.8" fill="#7dd3fc"/>
  <circle cx="26" cy="4" r="1" fill="#b8edff"/>
</svg>
